<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Thor EV: Pro Sonic</title>
    <style>
        :root { --accent: #22d3ee; --text: #f8fafc; }
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            background: #000; font-family: sans-serif; color: var(--text);
        }
        .orb-container {
            position: relative; width: 70vw; height: 70vw; max-width: 300px; max-height: 300px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px);
            border: 2px solid rgba(34, 211, 238, 0.3); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(34, 211, 238, 0.2);
        }
        #speed { font-size: 100px; font-weight: 100; margin: 0; color: var(--accent); }
        .controls { 
            position: absolute; bottom: 30px; width: 85%; max-width: 350px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 12px;
            text-transform: uppercase; font-weight: bold;
        }
        .btn-start { background: var(--accent); color: #000; border: none; }
        #summaryOverlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; 
        }
    </style>
</head>
<body>

    <div id="summaryOverlay">
        <h2>TRIP SUMMARY</h2>
        <div id="statsContent"></div>
        <button class="btn" style="width: 200px; margin-top: 20px;" onclick="closeSummary()">Dismiss</button>
    </div>

    <div id="mainOrb" class="orb-container">
        <div id="speed">0</div>
        <div style="letter-spacing:5px; opacity:0.5; font-size:10px;">KM/H</div>
        <div id="timer" style="font-family:monospace; margin-top:10px;">00:00</div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn btn-start" onclick="initEngine()">Start Thor Engine</button>
        <button id="stopBtn" class="btn" style="display:none; background: #ef4444;" onclick="stopEngine()">Power Off</button>
        <button id="modeBtn" class="btn" onclick="cycleMode()">Mode: Future Pro</button>
        <input type="range" id="volume" min="0" max="2.0" step="0.1" value="1.0" oninput="updateMasterVol()">
    </div>

    <script>
        let audioCtx, masterGain, shaper, harmonics = [], watchId;
        let lastPos, lastTime, startTime, timerInterval, tripSpeeds = [], maxSpeed = 0;
        let currentModeIndex = 0;

        const modes = [
            { name: "Future Pro", type: "sawtooth", distortion: 50, multi: 1 },
            { name: "Stealth", type: "sine", distortion: 0, multi: 1.2 },
            { name: "Titan", type: "triangle", distortion: 100, multi: 0.6 }
        ];

        // Create the Thor Distortion Curve
        function makeDistortionCurve(amount) {
            let k = typeof amount === 'number' ? amount : 50,
                n_samples = 44100,
                curve = new Float32Array(n_samples),
                deg = Math.PI / 180,
                x;
            for (let i = 0; i < n_samples; ++i ) {
                x = i * 2 / n_samples - 1;
                curve[i] = ( 3 + k ) * x * 20 * deg / ( Math.PI + k * Math.abs(x) );
            }
            return curve;
        }

        async function initEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            masterGain = audioCtx.createGain();
            masterGain.gain.value = document.getElementById('volume').value;

            // Thor Speaker Optimization Node
            shaper = audioCtx.createWaveShaper();
            shaper.curve = makeDistortionCurve(modes[currentModeIndex].distortion);
            shaper.oversample = '4x';

            const filter = audioCtx.createBiquadFilter();
            filter.type = "lowpass";
            filter.frequency.value = 4000;

            masterGain.connect(shaper).connect(filter).connect(audioCtx.destination);

            createHarmonics();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            startGpsTracking();
        }

        function createHarmonics() {
            harmonics.forEach(h => h.osc.stop());
            harmonics = [];
            const mode = modes[currentModeIndex];
            // Multi-layer frequencies for "thick" sound
            [1, 1.005, 2].forEach(r => {
                let osc = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                osc.type = mode.type;
                g.gain.value = 0;
                osc.connect(g).connect(masterGain);
                osc.start();
                harmonics.push({ osc, gain: g, ratio: r });
            });
        }

        function cycleMode() {
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            document.getElementById('modeBtn').innerText = `Mode: ${modes[currentModeIndex].name}`;
            if (audioCtx) {
                shaper.curve = makeDistortionCurve(modes[currentModeIndex].distortion);
                createHarmonics();
            }
        }

        function handleMotion(pos) {
            const s = Math.round(Math.max(0, pos.coords.speed ? pos.coords.speed * 3.6 : calculateSpeed(pos)));
            document.getElementById('speed').innerText = s;
            if (s > 2) {
                tripSpeeds.push(s); if (s > maxSpeed) maxSpeed = s;
            }
            updateSounds(s);
        }

        function updateSounds(speed) {
            if (!audioCtx) return;
            const baseFreq = 60 + (speed * 4); // Lower base for more "grunt"
            harmonics.forEach(h => {
                const now = audioCtx.currentTime;
                h.osc.frequency.setTargetAtTime(baseFreq * h.ratio, now, 0.2);
                let vol = speed === 0 ? 0.03 : Math.min(0.1 + (speed / 50), 0.4);
                h.gain.gain.setTargetAtTime(vol * modes[currentModeIndex].multi, now, 0.2);
            });
        }

        function stopEngine() {
            if (!audioCtx) return;
            const avg = tripSpeeds.length > 0 ? Math.round(tripSpeeds.reduce((a,b)=>a+b)/tripSpeeds.length) : 0;
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            audioCtx.close().then(() => {
                audioCtx = null;
                document.getElementById('statsContent').innerHTML = `<h3>${avg} KM/H AVG</h3><h3>${maxSpeed} KM/H MAX</h3>`;
                document.getElementById('summaryOverlay').style.display = 'flex';
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
                document.getElementById('speed').innerText = "0";
            });
        }

        function updateTimer() {
            const elapsed = Date.now() - startTime;
            const m = String(Math.floor((elapsed / 60000) % 60)).padStart(2, '0');
            const s = String(Math.floor((elapsed / 1000) % 60)).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        function calculateSpeed(pos) {
            const now = pos.timestamp;
            if (lastPos && lastTime) {
                const d = getDistance(lastPos.latitude, lastPos.longitude, pos.coords.latitude, pos.coords.longitude);
                const t = (now - lastTime) / 3600000;
                lastPos = pos.coords; lastTime = now; return d / t;
            }
            lastPos = pos.coords; lastTime = now; return 0;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180, dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateMasterVol() { if (masterGain) masterGain.gain.value = document.getElementById('volume').value; }
        function startGpsTracking() { watchId = navigator.geolocation.watchPosition(handleMotion, null, { enableHighAccuracy: true }); }
        function closeSummary() { document.getElementById('summaryOverlay').style.display = 'none'; }
    </script>
</body>
</html>
