<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thor EV: 7-Mode Elite</title>
    <style>
        :root { --accent: #22d3ee; --text: #f8fafc; }
        html, body { height: 100%; width: 100%; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; font-family: sans-serif; color: var(--text); }
        .orb-container { position: relative; width: 260px; height: 260px; background: rgba(255, 255, 255, 0.02); border: 2px solid var(--accent); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        #speed { font-size: 80px; font-weight: 100; color: var(--accent); }
        .controls { position: absolute; bottom: 20px; width: 85%; max-width: 350px; display: flex; flex-direction: column; gap: 8px; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .btn-start { background: var(--accent); color: #000; border: none; }
    </style>
</head>
<body>

    <div class="orb-container" id="orb">
        <div id="speed">0</div>
        <div style="letter-spacing:5px; opacity:0.5; font-size:10px;">KM/H</div>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn btn-start" onclick="initEngine()">Engage Systems</button>
        <button id="stopBtn" class="btn" style="display:none; background: #ef4444;" onclick="stopEngine()">Power Down</button>
        <button id="modeBtn" class="btn" onclick="cycleMode()">Mode: Future Pro</button>
        <input type="range" id="volume" min="0" max="1.5" step="0.1" value="0.8" oninput="updateMasterVol()">
    </div>

    <script>
        let audioCtx, masterGain, noiseNode, harmonics = [], watchId;
        let currentModeIndex = 0;

        const modes = [
            { name: "Future Pro", type: "sawtooth", noise: 0.02, mod: 4, color: "#22d3ee" },
            { name: "Stealth", type: "sine", noise: 0, mod: 3, color: "#94a3b8" },
            { name: "Titan", type: "triangle", noise: 0.05, mod: 2, color: "#f87171" },
            { name: "Cyber-V8", type: "sawtooth", noise: 0.1, mod: 15, color: "#fbbf24" },
            { name: "Interceptor", type: "square", noise: 0.01, mod: 50, color: "#2dd4bf" },
            { name: "Hyper-Flow", type: "sine", noise: 0.03, mod: 5, color: "#a78bfa" },
            { name: "V12 Beast", type: "sawtooth", noise: 0.25, mod: 8, color: "#f43f5e" }
        ];

        async function initEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.connect(audioCtx.destination);
            
            // Create Pink Noise (The "Exhaust" sound)
            const bufferSize = 2 * audioCtx.sampleRate;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
            
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = noiseBuffer;
            noiseNode.loop = true;
            
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = "lowpass";
            noiseFilter.frequency.value = 500;
            
            this.noiseGain = audioCtx.createGain();
            this.noiseGain.gain.value = 0;
            
            noiseNode.connect(noiseFilter).connect(this.noiseGain).connect(masterGain);
            noiseNode.start();

            createHarmonics();
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            startGpsTracking();
        }

        function createHarmonics() {
            harmonics.forEach(h => h.osc.stop());
            harmonics = [];
            const mode = modes[currentModeIndex];
            
            [1, 1.01, 1.5, 2].forEach(r => {
                let osc = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                osc.type = mode.type;
                g.gain.value = 0;
                osc.connect(g).connect(masterGain);
                osc.start();
                harmonics.push({ osc, gain: g, ratio: r });
            });
            document.getElementById('orb').style.borderColor = mode.color;
        }

        function cycleMode() {
            currentModeIndex = (currentModeIndex + 1) % modes.length;
            document.getElementById('modeBtn').innerText = `Mode: ${modes[currentModeIndex].name}`;
            if (audioCtx) createHarmonics();
        }

        function handleMotion(pos) {
            const s = Math.round(pos.coords.speed ? pos.coords.speed * 3.6 : 0);
            document.getElementById('speed').innerText = s;
            updateSounds(s);
        }

        function updateSounds(speed) {
            if (!audioCtx) return;
            const mode = modes[currentModeIndex];
            const baseFreq = (currentModeIndex === 6 ? 40 : 60) + (speed * (currentModeIndex === 6 ? 5 : 3.5));
            
            // Update Noise (Exhaust Hiss)
            const nVol = speed === 0 ? 0.01 : Math.min(speed / 100, 0.4);
            this.noiseGain.gain.setTargetAtTime(nVol * mode.noise, audioCtx.currentTime, 0.2);

            harmonics.forEach(h => {
                const now = audioCtx.currentTime;
                h.osc.frequency.setTargetAtTime(baseFreq * h.ratio, now, 0.2);
                let vol = speed === 0 ? 0.05 : Math.min(0.1 + (speed / 50), 0.5);
                h.gain.gain.setTargetAtTime(vol, now, 0.2);
            });
        }

        function stopEngine() {
            if (audioCtx) {
                audioCtx.close().then(() => {
                    audioCtx = null;
                    document.getElementById('startBtn').style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    document.getElementById('speed').innerText = "0";
                });
            }
        }

        function updateMasterVol() { if (masterGain) masterGain.gain.value = document.getElementById('volume').value; }
        function startGpsTracking() { watchId = navigator.geolocation.watchPosition(handleMotion, null, { enableHighAccuracy: true }); }
    </script>
</body>
</html>
