<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siri EV Sonic</title>
    <style>
        :root { --glow: rgba(139, 92, 246, 0.6); --text: #f8fafc; }
        body { 
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); 
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; color: var(--text); overflow: hidden;
        }
        .orb-container {
            position: relative; width: 320px; height: 320px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .moving .orb-container {
            box-shadow: 0 0 120px var(--glow);
            transform: scale(1.02);
        }
        #speed { 
            font-size: 100px; font-weight: 200; margin: 0; 
            letter-spacing: -2px; line-height: 1;
        }
        #unit { font-size: 12px; letter-spacing: 4px; opacity: 0.5; margin-top: 10px; }
        .controls {
            position: absolute; bottom: -120px; width: 100%;
            display: flex; flex-direction: column; gap: 15px;
        }
        .btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px; border-radius: 30px; cursor: pointer;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            transition: 0.2s;
        }
        .btn:active { background: rgba(255,255,255,0.3); }
        #status { font-size: 10px; opacity: 0.4; position: absolute; top: 40px; }
        .slider-wrap { margin-top: 20px; width: 80%; }
        input[type=range] { width: 100%; accent-color: #a78bfa; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="mainOrb" class="orb-container">
        <div id="status">OFFLINE</div>
        <div id="speed">0</div>
        <div id="unit">KM/H</div>

        <div class="controls">
            <button class="btn" onclick="initEngine()">Initialize Aura</button>
            <div class="slider-wrap">
                <input type="range" id="volume" min="0" max="1.5" step="0.1" value="0.8" oninput="updateMasterVol()">
            </div>
            <button class="btn" style="border:none; opacity:0.5" onclick="location.reload()">Reset</button>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, harmonics = [], watchId;
        let lastPos, lastTime;

        async function initEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Siri "Startup" Chime
            playSiriPop();

            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-15, audioCtx.currentTime);
            compressor.connect(audioCtx.destination);

            masterGain = audioCtx.createGain();
            masterGain.gain.value = document.getElementById('volume').value;
            masterGain.connect(compressor);

            // Create Harmonic Stack (The Siri Hum)
            const ratios = [1, 1.5, 2.0, 3.0];
            ratios.forEach(r => {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.connect(gain).connect(masterGain);
                osc.start();
                harmonics.push({ osc, gain, ratio: r });
            });

            document.getElementById('status').innerText = "AURA ACTIVE";
            startGpsTracking();
        }

        function playSiriPop() {
            const o1 = audioCtx.createOscillator();
            const o2 = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o1.frequency.setValueAtTime(480, audioCtx.currentTime);
            o2.frequency.setValueAtTime(600, audioCtx.currentTime);
            g.gain.setValueAtTime(0.2, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            o1.connect(g).connect(audioCtx.destination);
            o2.connect(g).connect(audioCtx.destination);
            o1.start(); o2.start();
            o1.stop(audioCtx.currentTime + 0.3); o2.stop(audioCtx.currentTime + 0.3);
        }

        function startGpsTracking() {
            watchId = navigator.geolocation.watchPosition(handleMotion, null, { enableHighAccuracy: true });
        }

        function handleMotion(pos) {
            const speed = pos.coords.speed ? pos.coords.speed * 3.6 : calculateSpeed(pos);
            const s = Math.round(Math.max(0, speed));
            
            document.getElementById('speed').innerText = s;
            document.getElementById('mainOrb').className = s > 1 ? "orb-container moving" : "orb-container";
            
            updateSounds(s);
        }

        function updateSounds(speed) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Modern EVs have a base hum around 180Hz
            const baseFreq = 180 + (speed * 4);
            
            harmonics.forEach(h => {
                // Smooth glide (0.3s) for the liquid feel
                h.osc.frequency.setTargetAtTime(baseFreq * h.ratio, now, 0.3);
                
                // Volume becomes "brighter" (more harmonics) as you go faster
                let v = speed === 0 ? 0.05 : Math.min(0.1 + (speed / 60), 0.4);
                h.gain.gain.setTargetAtTime(v / h.ratio, now, 0.3);
            });
        }

        function calculateSpeed(pos) {
            const now = pos.timestamp;
            if (lastPos && lastTime) {
                const d = getDistance(lastPos.latitude, lastPos.longitude, pos.coords.latitude, pos.coords.longitude);
                const t = (now - lastTime) / 3600000;
                lastPos = pos.coords; lastTime = now;
                return d / t;
            }
            lastPos = pos.coords; lastTime = now;
            return 0;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateMasterVol() {
            if (masterGain) masterGain.gain.value = document.getElementById('volume').value;
        }
    </script>
</body>
</html>
