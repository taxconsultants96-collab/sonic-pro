<div class="controls">
    <div id="actionRow" style="display: flex; gap: 10px;">
        <button id="startBtn" class="btn btn-active" style="flex: 2;" onclick="initEngine()">Initialize Aura</button>
        <button id="stopBtn" class="btn" style="flex: 1; display: none; background: rgba(239, 68, 68, 0.2); border-color: #ef4444;" onclick="stopEngine()">Off</button>
    </div>
    <button id="voiceToggle" class="btn" onclick="toggleVoice()">Voice Guidance: ON</button>
    <div class="slider-wrap">
        <input type="range" id="volume" min="0" max="1.5" step="0.1" value="0.8" oninput="updateMasterVol()">
    </div>
</div>

<script>
    // ... (keep previous variables)

    async function initEngine() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        playSiriPop(true); // Startup sound
        
        // UI Updates
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'block';

        // ... (rest of your existing init code)
        
        startGpsTracking();
        speak("Aura system online.");
    }

    function stopEngine() {
        if (!audioCtx) return;

        const now = audioCtx.currentTime;
        const duration = 0.8; // Seconds for the power-down effect

        // 1. "De-spool" effect: Slide pitch down and fade out
        harmonics.forEach(h => {
            h.osc.frequency.exponentialRampToValueAtTime(50, now + duration);
            h.gain.gain.linearRampToValueAtTime(0, now + duration);
        });

        // 2. Play Power-down chime
        playSiriPop(false); 

        // 3. Clean up after the sound finishes
        setTimeout(() => {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            audioCtx.close().then(() => {
                audioCtx = null;
                harmonics = [];
                document.getElementById('status').innerText = "SYSTEM OFFLINE";
                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
                document.getElementById('speed').innerText = "0";
                document.body.className = "";
            });
        }, duration * 1000);
    }

    function playSiriPop(isStartup) {
        const o1 = audioCtx.createOscillator();
        const o2 = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        
        // Startup is low to high, Shutdown is high to low
        const freq1 = isStartup ? 480 : 600;
        const freq2 = isStartup ? 600 : 480;

        o1.frequency.setValueAtTime(freq1, audioCtx.currentTime);
        o2.frequency.setValueAtTime(freq2, audioCtx.currentTime);
        
        g.gain.setValueAtTime(0.2, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        o1.connect(g).connect(audioCtx.destination);
        o2.connect(g).connect(audioCtx.destination);
        
        o1.start(); o2.start();
        o1.stop(audioCtx.currentTime + 0.4); o2.stop(audioCtx.currentTime + 0.4);
    }
    
    // ... (rest of your existing code)
</script>
