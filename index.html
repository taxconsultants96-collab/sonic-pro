<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EV Sonic Pro</title>
    <style>
        :root { --neon-green: #22c55e; --neon-purple: #8b5cf6; --bg-dark: #020617; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--bg-dark); color: #f8fafc; margin: 0; padding: 20px; touch-action: manipulation; }
        .dashboard { border: 2px solid #1e293b; border-radius: 35px; padding: 30px; background: linear-gradient(145deg, #1e293b, #0f172a); max-width: 420px; margin: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        #speed { font-size: 110px; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 25px rgba(34, 197, 94, 0.5); margin: 5px 0; font-variant-numeric: tabular-nums; line-height: 1; }
        #status { font-size: 11px; color: #64748b; height: 25px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { padding: 18px; font-size: 14px; font-weight: bold; color: white; background: #334155; border: none; border-radius: 18px; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-start { background: #3b82f6; grid-column: span 1; }
        .btn-stop { background: #ef4444; grid-column: span 1; }
        .btn-sport { border: 2px solid var(--neon-purple); color: var(--neon-purple); grid-column: span 2; }
        .btn-sport.active { background: var(--neon-purple); color: white; box-shadow: 0 0 25px rgba(139, 92, 246, 0.4); }
        .btn-turbo { background: linear-gradient(180deg, #f59e0b, #d97706); grid-column: span 2; height: 80px; font-size: 24px; box-shadow: 0 6px 0 #92400e; margin-top: 10px; }
        .btn-turbo:active { transform: translateY(4px); box-shadow: none; }
        .slider-box { margin-top: 25px; background: rgba(255,255,255,0.04); padding: 18px; border-radius: 20px; }
        input[type=range] { width: 100%; accent-color: var(--neon-green); cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div id="status">Engine Off</div>
        <div id="speed">0</div>
        <div style="font-size: 12px; color: #475569; margin-bottom: 15px;">KILOMETERS PER HOUR</div>
        
        <div class="btn-grid">
            <button class="btn btn-start" onclick="initEngine()">Start Engine</button>
            <button class="btn btn-stop" onclick="stopEngine()">Kill Switch</button>
            <button id="sportBtn" class="btn btn-sport" onclick="toggleSport()">Sport Mode: Off</button>
            <button id="turboBtn" class="btn btn-turbo" 
                onmousedown="startTurbo()" onmouseup="stopTurbo()" 
                ontouchstart="startTurbo()" ontouchend="stopTurbo()">BOOST TURBO</button>
        </div>

        <div class="slider-box">
            <label style="font-size: 11px; display: block; margin-bottom: 10px; color: #94a3b8;">CABIN LOUDNESS</label>
            <input type="range" id="volume" min="0" max="2.0" step="0.1" value="1.0" oninput="updateMasterVol()">
        </div>
    </div>

    <script>
        let audioCtx, mainOsc, subOsc, mainGain, subGain, masterGain, muffler, watchId;
        let noiseNode, noiseFilter, noiseGain, sportMode = false;
        let lastPos, lastTime;

        async function initEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. DYNAMICS COMPRESSOR (Prevents speaker clipping at 2.0 volume)
            const compressor = audioCtx.createDynamicsCompressor();
            compressor.threshold.setValueAtTime(-15, audioCtx.currentTime);
            compressor.knee.setValueAtTime(30, audioCtx.currentTime);
            compressor.connect(audioCtx.destination);

            masterGain = audioCtx.createGain();
            masterGain.gain.value = document.getElementById('volume').value;
            masterGain.connect(compressor);

            // 2. MUFFLER (Low Pass Filter for realistic depth)
            muffler = audioCtx.createBiquadFilter();
            muffler.type = 'lowpass';
            muffler.frequency.value = 800;
            muffler.connect(masterGain);

            // 3. ENGINE GROWL (Sawtooth)
            mainOsc = audioCtx.createOscillator();
            mainOsc.type = 'sawtooth';
            mainGain = audioCtx.createGain();
            mainGain.gain.value = 0;
            mainOsc.connect(mainGain).connect(muffler);

            // 4. SUB-BASS (The Rumble)
            subOsc = audioCtx.createOscillator();
            subOsc.type = 'sine';
            subGain = audioCtx.createGain();
            subGain.gain.value = 0;
            subOsc.connect(subGain).connect(muffler);

            // 5. TURBO TURBINE (High-pitched noise)
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = noiseBuffer;
            noiseNode.loop = true;
            noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.value = 800;
            noiseFilter.Q.value = 20;
            noiseGain = audioCtx.createGain();
            noiseGain.gain.value = 0;
            noiseNode.connect(noiseFilter).connect(noiseGain).connect(masterGain);

            mainOsc.start();
            subOsc.start();
            noiseNode.start();

            document.getElementById('status').innerText = "SYSTEM: READY TO DRIVE";
            startGpsTracking();
        }

        function toggleSport() {
            sportMode = !sportMode;
            const btn = document.getElementById('sportBtn');
            btn.classList.toggle('active');
            btn.innerText = sportMode ? "Sport Mode: Active" : "Sport Mode: Off";
        }

        function startGpsTracking() {
            watchId = navigator.geolocation.watchPosition(handleMotion, (err) => {
                document.getElementById('status').innerText = "GPS Error: " + err.message;
            }, { enableHighAccuracy: true });
        }

        function handleMotion(pos) {
            const coords = pos.coords;
            const now = pos.timestamp;
            let speed = 0;

            if (lastPos && lastTime) {
                const d = getDistance(lastPos.latitude, lastPos.longitude, coords.latitude, coords.longitude);
                const t = (now - lastTime) / 3600000;
                speed = d / t;
            }
            if (coords.speed !== null && coords.speed > 0) speed = coords.speed * 3.6;
            if (speed < 1 || speed > 220) speed = 0;

            document.getElementById('speed').innerText = Math.round(speed);
            updateSounds(speed);
            lastPos = coords;
            lastTime = now;
        }

        function updateSounds(speed) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            const multiplier = sportMode ? 2.5 : 1.0;
            const baseFreq = (65 + (speed * 7)) * multiplier;
            
            mainOsc.frequency.setTargetAtTime(baseFreq, now, 0.1);
            subOsc.frequency.setTargetAtTime(baseFreq / 2, now, 0.1);
            
            // Volume & Muffler Logic
            const vol = speed === 0 ? 0.2 : Math.min(0.3 + (speed / 20), 1.0);
            mainGain.gain.setTargetAtTime(vol, now, 0.1);
            subGain.gain.setTargetAtTime(vol * 1.3, now, 0.1);
            
            // "Open" the muffler as you go faster
            muffler.frequency.setTargetAtTime(800 + (speed * 40), now, 0.1);
        }

        function startTurbo() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            noiseFilter.frequency.exponentialRampToValueAtTime(8000, now + 1.5);
            noiseGain.gain.linearRampToValueAtTime(0.7, now + 0.5);
        }

        function stopTurbo() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            noiseFilter.frequency.exponentialRampToValueAtTime(800, now + 2.0);
            noiseGain.gain.linearRampToValueAtTime(0, now + 1.2);
        }

        function updateMasterVol() {
            if (masterGain) masterGain.gain.value = document.getElementById('volume').value;
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function stopEngine() {
            if (audioCtx) audioCtx.close();
            audioCtx = null;
            navigator.geolocation.clearWatch(watchId);
            document.getElementById('status').innerText = "Engine Off";
            document.getElementById('speed').innerText = "0";
        }
    </script>
</body>
</html>
